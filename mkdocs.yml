site_name: Kawakiri
site_description: Reverse engineering of dimensional models from undocumented tabular data
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Installation Guide: installation.md
  - Usage Guide: usage.md
  - Architecture: architecture.md
  - Validation Rules: RULES.md
  - Scoring System: scoring_system.md
  - Reproducibility: reproducibility.md
  - Technical Reference:
      - English: technical-reference.md
      - Français: technical-reference-fr.md
  - Release checklist: release-checklist.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
