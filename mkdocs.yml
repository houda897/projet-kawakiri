site_name: Kawakiri
site_description: Reverse engineering of dimensional models from undocumented tabular data
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Installation Guide: installation.md
  - Architecture: architecture.md
  - Tutorials:
      - Climate and Ocean: tutorials/climate-ocean.md
  - API Reference:
      - English: API_doc.md
      - Français: API_doc_fr.md
  - Research Paper: paper.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
