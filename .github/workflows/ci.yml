name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    stragtegy:
      matrix:
        python-version ["3.10", "3.11", "3.12"]

    steps:
    - name: Chechkout repository
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest.cov
        pip install -e ".[dev]"
        
    - name: Check formatting with Black
      run: |
        black --check code/
        
    - name: Lint with Ruff
      run: |
        ruff check code/
        
    - name: Run test
      env:
        CH_DATABASE: kawakiri_test_db
        META_DB: kawakiri_test_meta
      run: |
        pytest tests/ --cov=code/

name: Build JOSS Paper

on:
  push:
    paths:
      - 'paper.md'
      - 'biblio.bib'
      - '.github/workflows/joss-paper.yml'

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Draft JOSS Paper
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Build PDF using Inara
        uses: openjournals/inara@v1
        with:
          metadata_file: paper.md
          
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper-draft
          path: paper.pdf